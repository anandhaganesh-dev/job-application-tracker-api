<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <h1>Login</h1>
    <form id="login-form">
        <input type="email"
        id="email"
        placeholder="Email"
        required>
        <br><br>
        <input type="password"
        id="password"
        placeholder="Password"
        required>
        <br><br>
        <button type="submit">
            Login
        </button>
    </form>
    <p id="message"></p>

    <script src="../js/api.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
